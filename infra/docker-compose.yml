version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: orderflow-postgres
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: orderflow_user
      POSTGRES_PASSWORD: orderflow_password
      POSTGRES_DB: orderflow
    volumes:
      - orderflow-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  mongodb:
    image: mongo:7.0
    container_name: orderflow-mongodb
    ports:
      - "27018:27017"
    volumes:
      - orderflow-mongo-data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7.0-alpine
    container_name: orderflow-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  kafka:
    image: bitnami/kafka:3.7
    container_name: orderflow-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - orderflow-kafka-data:/bitnami/kafka
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: orderflow-prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: orderflow-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  orderflow-postgres-data:
  orderflow-mongo-data:
  orderflow-kafka-data:
